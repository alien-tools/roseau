project:
  name: roseau
  description: Fast and accurate API breaking change analysis of Java libraries
  longDescription: |
    Roseau detects binary and source breaking changes between two versions of a
    Java library. It can compare JAR files or source trees and publish reports
    suitable for local use, CI, and release automation.
  authors:
    - Thomas Degueule
    - Jean-Remy Falleri
    - Corentin Latappy
  license: MIT
  inceptionYear: 2023
  stereotype: CLI
  snapshot:
    label: early-access
    fullChangelog: true
  links:
    homepage: https://github.com/alien-tools/roseau
    documentation: https://alien-tools.github.io/roseau/
    bugTracker: https://github.com/alien-tools/roseau/issues
  languages:
    java:
      groupId: io.github.alien-tools
      artifactId: roseau-cli
      version: 25
      mainClass: io.github.alien.roseau.cli.RoseauCLI
      multiProject: true

release:
  github:
    owner: alien-tools
    name: roseau
    overwrite: true

checksum:
  algorithms:
    - SHA-256

signing:
  active: ALWAYS
  pgp:
    active: ALWAYS
    armored: true

deploy:
  maven:
    mavenCentral:
      release-deploy:
        active: RELEASE
        url: https://central.sonatype.com/api/v1/publisher
        namespace: '{{Env.JRELEASER_MAVENCENTRAL_NAMESPACE}}'
        stagingRepositories:
          - target/staging-deploy
    nexus2:
      snapshot-deploy:
        active: SNAPSHOT
        snapshotUrl: https://central.sonatype.com/repository/maven-snapshots/
        username: '{{Env.JRELEASER_MAVENCENTRAL_USERNAME}}'
        password: '{{Env.JRELEASER_MAVENCENTRAL_TOKEN}}'
        applyMavenCentralRules: true
        snapshotSupported: true
        stagingRepositories:
          - target/staging-deploy

distributions:
  roseau:
    type: SINGLE_JAR
    stereotype: CLI
    artifacts:
      - path: cli/target/roseau-{{projectVersion}}.jar

assemble:
  jlink:
    roseau-standalone:
      active: ALWAYS
      exported: true
      stereotype: CLI
      executable: roseau
      imageName: roseau-{{projectVersion}}
      mainJar:
        path: cli/target/roseau-{{projectVersion}}.jar
      targetJdks:
        - path: '{{Env.ROSEAU_JLINK_LINUX_X86_64_JDK}}'
          platform: linux-x86_64
        - path: '{{Env.ROSEAU_JLINK_OSX_X86_64_JDK}}'
          platform: osx-x86_64
        - path: '{{Env.ROSEAU_JLINK_OSX_AARCH64_JDK}}'
          platform: osx-aarch_64
        - path: '{{Env.ROSEAU_JLINK_WINDOWS_X86_64_JDK}}'
          platform: windows-x86_64
