site_name: Roseau
site_url: https://alien-tools.github.io/roseau
site_description: Roseau checks breaking changes and binary or source compatibility between two versions of a Java library.
exclude_docs: |
  requirements-docs.in
  requirements-docs.txt

theme:
  name: material
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - content.code.copy

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji ''
      emoji_generator: !!python/name:material.extensions.emoji.to_svg ''
  - pymdownx.highlight:
      anchor_linenums: true
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences

nav:
  - Getting Started:
      - Overview: index.md
      - Quickstart: quickstart.md
  - Guides:
      - Compare Two Versions: guides/compare.md
      - Use in CI: guides/ci.md
      - Ignore Accepted Breaking Changes: guides/ignored.md
      - Configuration File: guides/config.md
      - Report Formats: guides/reports.md
      - Maven Plug-in: guides/maven-plugin.md
  - Concepts:
      - API Surface: guides/api-surface.md
      - Breaking Change Kinds: breaking-change-kinds.md
  - Reference:
      - CLI Options: reference/cli.md
      - Maven Plug-in Options: reference/maven-plugin.md
