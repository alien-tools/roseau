name: Publish release from tag

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    permissions:
      contents: read
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'
      - name: Verify build
        run: ./mvnw --batch-mode ${{ runner.os == 'Windows' && '-Dmvnd.noDaemon=true' || '' }} verify

  stage:
    name: Stage Maven artifacts
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'
      - name: Build and stage Maven artifacts
        run: ./mvnw --batch-mode -DskipTests deploy -DaltDeploymentRepository=local::file:target/staging-deploy
      - name: Archive Maven staging repository
        run: tar -C target -czf target/maven-staging.tar.gz staging-deploy
      - name: Upload Maven staging repository
        uses: actions/upload-artifact@v7
        with:
          name: maven-staging
          path: target/maven-staging.tar.gz
          if-no-files-found: error
      - name: Upload shaded CLI JAR
        uses: actions/upload-artifact@v7
        with:
          name: single-jar
          path: cli/target/roseau-[0-9]*.jar
          if-no-files-found: error

  assemble-jlink:
    name: Assemble jlink ${{ matrix.platform }}
    needs: stage
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        shell: bash
    permissions:
      contents: read
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux-x86_64
          - runner: ubuntu-24.04-arm
            platform: linux-aarch_64
          - runner: macos-15-intel
            platform: osx-x86_64
          - runner: macos-latest
            platform: osx-aarch_64
          - runner: windows-latest
            platform: windows-x86_64
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'
      - name: Build CLI artifacts
        run: ./mvnw --batch-mode ${{ runner.os == 'Windows' && '-Dmvnd.noDaemon=true' || '' }} -pl cli -am -DskipTests clean package
      - name: Assemble jlink archive
        run: ./mvnw --batch-mode ${{ runner.os == 'Windows' && '-Dmvnd.noDaemon=true' || '' }} -N jreleaser:assemble -Djreleaser.config.file=jreleaser.yml -Djreleaser.assemble.jlink.roseau-standalone.jdk.path="$JAVA_HOME" -Djreleaser.assemble.jlink.roseau-standalone.jdk.platform="${{ matrix.platform }}"
      - name: Upload jlink archive
        uses: actions/upload-artifact@v7
        with:
          name: jlink-${{ matrix.platform }}
          path: target/jreleaser/assemble/roseau-standalone/jlink/*.zip
          if-no-files-found: error

  publish:
    name: Publish release with JReleaser
    needs:
      - stage
      - assemble-jlink
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'
      - name: Download Maven staging repository
        uses: actions/download-artifact@v8
        with:
          name: maven-staging
          path: target
      - name: Restore Maven staging repository
        run: tar -C target -xzf target/maven-staging.tar.gz
      - name: Download shaded CLI JAR
        uses: actions/download-artifact@v8
        with:
          name: single-jar
          path: cli/target
      - name: Download jlink archives
        uses: actions/download-artifact@v8
        with:
          pattern: jlink-*
          merge-multiple: true
          path: target/jreleaser/assemble/roseau-standalone/jlink
      - name: Publish release with JReleaser
        run: ./mvnw --batch-mode -N jreleaser:full-release -Djreleaser.config.file=jreleaser.yml
        env:
          JRELEASER_GITHUB_TOKEN: ${{ github.token }}
          JRELEASER_GPG_PUBLIC_KEY: ${{ secrets.GPG_PUBLIC_KEY }}
          JRELEASER_GPG_SECRET_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          JRELEASER_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          JRELEASER_MAVENCENTRAL_RELEASE_DEPLOY_USERNAME: ${{ secrets.NEXUS_USERNAME }}
          JRELEASER_MAVENCENTRAL_RELEASE_DEPLOY_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}
