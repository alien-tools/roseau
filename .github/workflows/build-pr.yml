name: Maven Build & Test (PRs)

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.head || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'
      - name: Restore popular library fixtures
        uses: actions/cache@v5
        with:
          path: core/target/popular-libraries-fixtures
          key: popular-libraries-${{ runner.os }}-jdk25-${{ hashFiles('core/src/test/resources/popular-libraries.tsv') }}
          restore-keys: |
            popular-libraries-${{ runner.os }}-jdk25-
      - name: Build with Maven
        run: ./mvnw --batch-mode -DskipTests package
      - name: Run tests
        run: ./mvnw --batch-mode verify
