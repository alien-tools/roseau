name: Build and deploy docs
on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.9.21"
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Create docs virtual environment
        run: uv venv
      - name: Install docs dependencies
        run: uv pip sync docs/requirements-docs.txt
      - name: Validate docs
        run: .venv/bin/mkdocs build --strict
      - name: Deploy docs
        run: .venv/bin/mkdocs gh-deploy --force
