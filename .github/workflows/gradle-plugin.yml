name: Gradle Plugin

on:
  pull_request:
    branches:
      - main
    paths:
      - gradle-plugin/**
      - core/**
      - .github/workflows/gradle-plugin.yml
  push:
    branches:
      - main
    paths:
      - gradle-plugin/**
      - core/**
      - .github/workflows/gradle-plugin.yml
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 30
    defaults:
      run:
        working-directory: gradle-plugin
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          build-root-directory: gradle-plugin

      - name: Build Gradle plugin
        run: ./gradlew build

      - name: Publish test results
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: Gradle Plugin Tests
          path: gradle-plugin/build/test-results/test/*.xml
          reporter: java-junit
          fail-on-error: true

  snapshot:
    name: Publish snapshot
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 30
    defaults:
      run:
        working-directory: gradle-plugin
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          build-root-directory: gradle-plugin

      - name: Stage Gradle plugin snapshot
        run: ./gradlew publish

      - name: Deploy snapshot with JReleaser
        run: ./gradlew jreleaserDeploy
        env:
          JRELEASER_GITHUB_TOKEN: ${{ github.token }}
          JRELEASER_GPG_PUBLIC_KEY: ${{ secrets.GPG_PUBLIC_KEY }}
          JRELEASER_GPG_SECRET_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          JRELEASER_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          JRELEASER_MAVENCENTRAL_SONATYPE_USERNAME: ${{ secrets.NEXUS_USERNAME }}
          JRELEASER_MAVENCENTRAL_SONATYPE_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}
